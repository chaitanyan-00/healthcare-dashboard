name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Test & Liveness Check
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Install backend dependencies
      run: |
        cd backend
        pip install --upgrade pip
        pip install Flask flask-cors
        pip install -r requirements.txt || true
    
    - name: Initialize database
      run: |
        cd backend
        python init_db.py
    
    - name: Start backend server
      run: |
        cd backend
        python app.py &
        sleep 10
    
    - name: Run Liveness Check
      run: |
        # Test health endpoint
        curl -f http://localhost:5000/ || exit 1
        echo "✅ Health check passed!"
        
        # Test patients endpoint
        curl -f http://localhost:5000/patients -H "role: DOCTOR" || exit 1
        echo "✅ Patients endpoint passed!"
        
        # Search endpoint test
        curl -f "http://localhost:5000/patients/search?q=John" -H "role: DOCTOR" || exit 1
        echo "✅ Search endpoint passed!"
    
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
    
    - name: Install frontend dependencies
      run: |
        cd frontend
        npm ci --legacy-peer-deps || npm install --legacy-peer-deps
    
    - name: Build frontend
      run: |
        cd frontend
        CI=false npm run build
    
    - name: Upload build artifacts
      uses: actions/upload-artifact@v3
      with:
        name: build
        path: frontend/build/

  deploy:
    name: Deploy to Production
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Download build artifacts
      uses: actions/download-artifact@v3
      with:
        name: build
        path: frontend/build/
    
    - name: Deploy (Demo Mode)
      run: |
        echo "🚀 Deployment would happen here"
        echo "✅ CI/CD Pipeline completed successfully!"
        echo "📦 Build artifacts ready for deployment"
        echo "🌐 To deploy to Cloud Run, add your GCP credentials to GitHub Secrets"
